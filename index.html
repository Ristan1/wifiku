<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi Pay PWA</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    [x-cloak] { display: none !important; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    input[type="date"] { color-scheme: dark; }
  </style>
</head>
<body class="min-h-screen flex flex-col antialiased" x-data="wifiApp()">

  <div class="fixed top-5 right-5 z-50 flex flex-col gap-2 max-w-sm">
    <template x-for="toast in toasts" :key="toast.id">
      <div class="flex items-center gap-3 p-4 rounded-xl border backdrop-blur-md shadow-2xl bg-blue-500/10 border-blue-500/30 text-blue-400">
        <i class="ph ph-info text-xl"></i>
        <p class="text-xs font-semibold" x-text="toast.message"></p>
        <button @click="removeToast(toast.id)" class="ml-auto"><i class="ph ph-x"></i></button>
      </div>
    </template>
  </div>

  <header class="sticky top-0 z-40 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
    <div class="max-w-6xl mx-auto px-4 h-18 flex items-center justify-between py-4">
      <div>
        <h1 class="text-lg font-bold text-white flex items-center gap-2">
          WiFi Pay <span class="bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] px-2 py-0.5 rounded-full">PWA</span>
          <span x-show="!isOnline" class="bg-rose-500 text-white text-[9px] px-2 py-0.5 rounded-full animate-pulse">OFFLINE MODE</span>
        </h1>
      </div>
      <div class="flex items-center gap-2">
        <template x-if="offlineQueue.length > 0">
          <button @click="syncOfflineData()" class="p-2.5 rounded-lg bg-amber-500 hover:bg-amber-400 text-slate-900 shadow-lg transition-all flex items-center gap-2 text-xs font-bold animate-pulse">
            <i class="ph ph-cloud-arrow-up text-sm"></i>
            <span class="hidden md:inline" x-text="'Sinkron ' + offlineQueue.length + ' Data'"></span>
          </button>
        </template>
        <button @click="fetchData()" class="p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 transition-all flex items-center gap-2 text-xs" :disabled="loading">
          <i class="ph ph-arrows-clockwise text-sm" :class="loading ? 'animate-spin' : ''"></i>
        </button>
        <button @click="openAddModal()" class="p-2.5 rounded-lg bg-blue-600 hover:bg-blue-500 text-white shadow-lg transition-all flex items-center gap-2 text-xs font-bold">
          <i class="ph ph-user-plus text-sm"></i><span class="hidden md:inline">Tambah</span>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-6 space-y-6">
    <div x-show="loading" class="w-full bg-blue-500/5 border border-blue-500/10 p-4 rounded-xl flex items-center gap-3">
      <svg class="animate-spin h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
      <p class="text-xs font-semibold text-blue-300">Menghubungkan ke Server API...</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 relative overflow-hidden"><p class="text-xs font-semibold text-slate-400 uppercase">Total Pelanggan</p><h3 class="text-2xl font-extrabold text-white mt-1" x-text="customers.length + ' Orang'"></h3><div class="absolute bottom-0 left-0 right-0 h-1 bg-blue-500"></div></div>
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 relative overflow-hidden"><p class="text-xs font-semibold text-slate-400 uppercase">Total Tunggakan Uang</p><h3 class="text-2xl font-extrabold text-rose-500 mt-1" x-text="formatRupiah(calculateTotalArrears())"></h3><div class="absolute bottom-0 left-0 right-0 h-1 bg-rose-500"></div></div>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-2xl shadow-xl">
      <div class="p-5 border-b border-slate-800 space-y-4">
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500"><i class="ph ph-magnifying-glass text-lg"></i></span>
          <input type="text" x-model="searchQuery" placeholder="Cari nama pelanggan..." class="w-full bg-slate-950 border border-slate-800 text-slate-100 rounded-xl pl-10 pr-4 py-3 text-xs outline-none focus:border-blue-500 transition-all">
        </div>
      </div>

      <div class="divide-y divide-slate-800">
        <template x-for="item in filteredCustomers()" :key="item.name">
          <div class="p-5 flex flex-col gap-4">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
              <div class="flex items-start gap-3">
                <div class="w-10 h-10 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center text-slate-400"><i class="ph ph-user text-xl"></i></div>
                <div>
                  <h4 class="text-sm font-extrabold text-white" x-text="item.name"></h4>
                  <p class="text-[11px] text-slate-500 mt-0.5 flex items-center gap-1.5">
                    <span>Pasang: <strong class="text-slate-300" x-text="item.installationDate"></strong></span>
                  </p>
                </div>
              </div>
              <div class="text-right">
                <template x-if="item.realArrears > 0"><div><p class="text-[10px] font-bold text-rose-500 uppercase">Tunggakan</p><h4 class="text-lg font-black text-rose-500 mt-0.5" x-text="formatRupiah(item.realArrears)"></h4></div></template>
                <template x-if="item.realArrears <= 0"><div><p class="text-[10px] font-bold text-emerald-500 uppercase">LUNAS AMAN</p></div></template>
              </div>
            </div>

            <div class="space-y-2">
              <div class="flex gap-2 pb-1 overflow-x-auto">
                <template x-for="(month, mIndex) in months" :key="month">
                  <button @click="if(mIndex >= getInstallMonthIndex(item.installationDate)) openPaymentModal(item, mIndex)"
                          :class="getButtonClass(item, mIndex)"
                          class="flex-shrink-0 border px-3 py-2 rounded-xl text-center flex flex-col items-center gap-1 min-w-[56px] transition-all">
                    <span class="text-[10px] font-bold" x-text="month"></span>
                    <span class="text-[10px] font-extrabold" x-text="getButtonStatusText(item, mIndex)"></span>
                  </button>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </main>

  <div x-show="paymentModalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm" @click.self="paymentModalOpen = false">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl">
      <div class="p-5 border-b border-slate-800 flex flex-col">
        <h3 class="text-base font-extrabold text-white">Catat Pembayaran</h3>
        <p class="text-[11px] text-slate-400 mt-1">Pelanggan: <strong class="text-blue-400" x-text="paymentData.customer?.name"></strong></p>
      </div>
      <form @submit.prevent="submitPayment" class="p-5 space-y-4">
        <div class="space-y-1.5">
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Nominal Bayar / Kode Diskon</label>
          <input type="text" x-model="paymentData.nominal" @input="formatInputNominal($event)" required placeholder="Contoh: 150.000" class="w-full bg-slate-950 border border-slate-800 text-slate-100 rounded-xl px-3.5 py-2.5 text-sm outline-none focus:border-blue-500 font-bold">
        </div>
        <div class="pt-2 flex gap-2">
          <button type="button" @click="paymentModalOpen = false" class="flex-1 py-2.5 rounded-lg bg-slate-800 text-slate-400 text-xs font-bold">Batal</button>
          <button type="submit" class="flex-1 py-2.5 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold shadow-lg shadow-emerald-600/15">Proses Pembayaran</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // MASUKKAN URL APP SCRIPT ANDA DI SINI
    const API_URL = "https://script.google.com/macros/s/AKfycbwhV_3ZWP-Thpkm0qLSXXyuQ0_EBoAVUxDmhuXKcfXvSPguxaM85vPUwCn83tuZcnkA/exec";

    function wifiApp() {
      return {
        customers: JSON.parse(localStorage.getItem('wifiCacheData')) || [],
        loading: false, searchQuery: '', 
        months: ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"],
        toasts: [], modalOpen: false, form: { name: '', installationDate: '' },
        paymentModalOpen: false, paymentData: { customer: null, monthIndex: 0, monthName: '', nominal: '' },
        isOnline: navigator.onLine,
        offlineQueue: JSON.parse(localStorage.getItem('wifiOfflineQueue')) || [],

        init() { 
          if(this.customers.length === 0) this.fetchData();
          window.addEventListener('online', () => { this.isOnline = true; this.showToast('📶 Online kembali!'); });
          window.addEventListener('offline', () => { this.isOnline = false; this.showToast('⚠️ Sinyal hilang. Mode Offline.'); });
        },
        
        showToast(message) { const id = Date.now(); this.toasts.push({ id, message }); setTimeout(() => this.toasts = this.toasts.filter(t => t.id !== id), 5000); },
        saveQueueLocally() { localStorage.setItem('wifiOfflineQueue', JSON.stringify(this.offlineQueue)); },

        // MENGAMBIL DATA DARI API GOOGLE
        async fetchData() {
          if (!this.isOnline || API_URL.includes("URL_WEB_APP")) return;
          this.loading = true;
          try {
            const response = await fetch(`${API_URL}?action=getAllCustomers`);
            const data = await response.json();
            this.customers = data;
            localStorage.setItem('wifiCacheData', JSON.stringify(data)); 
          } catch (error) {
            this.showToast("Gagal mengambil data dari server.");
          } finally {
            this.loading = false;
          }
        },

        formatRupiah(amount) { return "Rp " + new Intl.NumberFormat("id-ID").format(Math.abs(amount)); },

        formatInputNominal(event) {
          let value = event.target.value; let cleanValue = value.replace(/\./g, ''); let match = cleanValue.match(/^(\d+)(.*)$/);
          if (match) { this.paymentData.nominal = match[1].replace(/\B(?=(\d{3})+(?!\d))/g, ".") + match[2]; } 
          else { this.paymentData.nominal = value; }
        },
        
        isPaid(customer, monthIndex) { 
          const keys = ["jan", "feb", "mar", "apr", "may", "jun", "jul", "aug", "sep", "oct", "nov", "dec"];
          return customer[keys[monthIndex]] === "Lunas"; 
        },

        getInstallMonthIndex(dateStr) {
          if (!dateStr) return 0; const str = dateStr.toString().toLowerCase();
          if (str.includes("jan")) return 0; if (str.includes("feb")) return 1; if (str.includes("mar")) return 2;
          if (str.includes("apr")) return 3; if (str.includes("mei") || str.includes("may")) return 4; if (str.includes("jun")) return 5;
          if (str.includes("jul")) return 6; if (str.includes("agu") || str.includes("aug")) return 7; if (str.includes("sep")) return 8;
          if (str.includes("okt") || str.includes("oct")) return 9; if (str.includes("nov")) return 10; if (str.includes("des") || str.includes("dec")) return 11;
          const parts = str.split('-'); if (parts.length === 3) return parseInt(parts[1], 10) - 1; 
          return 0;
        },

        getButtonStatusText(item, mIndex) {
          if (mIndex < this.getInstallMonthIndex(item.installationDate)) return 'KOSONG';
          return this.isPaid(item, mIndex) ? 'LUNAS' : 'BELUM';
        },

        getButtonClass(item, mIndex) {
          if (mIndex < this.getInstallMonthIndex(item.installationDate)) return 'bg-slate-900 text-slate-700 opacity-50';
          if (this.isPaid(item, mIndex)) return 'bg-emerald-600 text-white';
          if (mIndex <= new Date().getMonth()) return 'bg-rose-500/10 text-rose-500';
          return 'bg-slate-900 text-slate-400';
        },

        calculateTotalArrears() { return this.customers.reduce((acc, user) => acc + (user.realArrears > 0 ? user.realArrears : 0), 0); },
        filteredCustomers() { return this.customers.filter(c => c.name.toLowerCase().includes(this.searchQuery.toLowerCase())); },

        openPaymentModal(customer, monthIndex) {
          this.paymentData = { customer: customer, monthIndex: monthIndex, nominal: '' };
          this.paymentModalOpen = true;
        },

        // MENGIRIM DATA PEMBAYARAN KE API
        async submitPayment() {
          const nominal = this.paymentData.nominal;
          if (!nominal || nominal.trim() === "") return;
          const cleanNominal = nominal.replace(/\./g, '');
          this.paymentModalOpen = false;

          const payload = { type: 'payment', customerName: this.paymentData.customer.name, monthIndex: this.paymentData.monthIndex, nominal: cleanNominal };

          if (!this.isOnline) {
            this.offlineQueue.push(payload); this.saveQueueLocally();
            this.showToast(`Offline: Pembayaran ${this.paymentData.customer.name} masuk antrean.`);
            return;
          }

          this.loading = true;
          try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            this.showToast("Berhasil!");
            this.fetchData(); 
          } catch(err) {
            this.showToast("Gagal mengirim, simpan ke antrean.");
            this.offlineQueue.push(payload); this.saveQueueLocally();
          } finally { this.loading = false; }
        },

        // MENEMBAK ANTREAN BRANKAS KE API
        async syncOfflineData() {
          if (!this.isOnline) return this.showToast("Masih Offline!");
          this.loading = true;
          
          for (let i = 0; i < this.offlineQueue.length; i++) {
            try {
              await fetch(API_URL, { method: 'POST', body: JSON.stringify(this.offlineQueue[i]) });
            } catch(e) {
              this.showToast("Sinyal putus di tengah jalan!"); this.loading = false; return;
            }
          }
          
          this.offlineQueue = []; this.saveQueueLocally();
          this.showToast("✅ Sinkronisasi semua data selesai!");
          this.fetchData();
        }
      };
    }
  </script>
</body>
</html>
